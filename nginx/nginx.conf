events {
    worker_connections 1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;
    
    sendfile        on;
    keepalive_timeout  65;

    server {
        listen 5000;
        server_name localhost;
        root /usr/share/nginx/html;

        # Frontend - статические файлы
        location / {
            root /usr/share/nginx/html;  # ← Исправлено: стандартный путь nginx
            index index.html index.htm;
            try_files $uri $uri/ /index.html;
        }
        location ~* \.(css|js|png|jpg|jpeg|gif|ico|svg)$ {
            expires 1y;
            add_header Cache-Control "public, immutable";
        }
        
        # Backend API - проксирование к Flask
        location /api/ {
            proxy_pass http://app:5000/;  # ← Исправлено: порт 5000 вместо 8000
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            
            # Для загрузки файлов
            client_max_body_size 10M;
        }

        # Загруженные изображения
        location /images/ {
            alias /usr/share/nginx/images/;  # ← Исправлено: убрано "root", добавлен слэш в конце
            expires 1y;
            add_header Cache-Control "public, max-age=31536000";
            autoindex off;
        }

        # Обработка ошибок
        error_page 500 502 503 504 /50x.html;
        location = /50x.html {
            root /usr/share/nginx/html;
        }
        
        # Логи (опционально, могут быть проблемы с правами)
        # error_log /var/log/nginx/error.log;
        # access_log /var/log/nginx/access.log;
    }
}